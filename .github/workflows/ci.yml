name: CI

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      # .gs 本質是 JS。新版 Node 的 `node --check` 不認得 .gs 副檔名,
      # 改用 vm.Script 只編譯不執行來檢查語法。
      - name: Check .gs syntax
        run: |
          set -e
          for f in *.gs; do
            echo "Checking $f"
            node -e "new (require('vm').Script)(require('fs').readFileSync(process.argv[1],'utf8'), {filename: process.argv[1]})" "$f"
          done

      - name: Validate appsscript.json
        run: node -e "JSON.parse(require('fs').readFileSync('appsscript.json','utf8'))"
