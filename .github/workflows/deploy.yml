name: Deploy to Apps Script

on:
  push:
    branches: [master]
  workflow_dispatch:

# 同一時間只允許一個部署,避免同時 clasp push 造成衝突
concurrency:
  group: clasp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install clasp
        # 對齊本機 clasp v3 憑證格式 (~/.clasprc.json 為 { "tokens": { "default": ... } })
        run: npm install -g @google/clasp@3.3.0

      - name: Authenticate clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Generate .clasp.json
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          cat > .clasp.json <<EOF
          {
            "scriptId": "${SCRIPT_ID}",
            "rootDir": "",
            "scriptExtensions": [".gs"],
            "htmlExtensions": [".html"],
            "jsonExtensions": [".json"]
          }
          EOF

      - name: Push to Apps Script
        run: clasp push --force

      # 把固定的 Web App 部署更新到最新版本,讓 webhook/網頁的網址永遠不變、
      # 又總是服務最新程式碼(版本化部署不會被 clasp push 自動更新,需明確 deploy)。
      - name: Redeploy fixed web app deployment
        run: clasp deploy -i AKfycbwOJY0pkh927RBaNUySRXP-h_jqqX87BX3d9zIsJLo63gjeazYnsOEnlGmaXzATIuC8 -d "auto ${{ github.sha }}"
